<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#a0c898">
  <title>Soroban Machine</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <h1>Soroban Machine</h1>

  <div id="app-mode-container" class="app-mode-tabs"></div>

  <div class="app-layout" id="practice-layout">
    <aside class="tree-panel">
      <div id="skill-tree-container"></div>
    </aside>

    <main class="practice-panel">
      <div class="selectors-row">
        <div id="skill-container" hidden></div>
        <div id="support-container"></div>
        <div id="mode-container"></div>
      </div>

      <hr>

      <div id="legend-container"></div>
      <div class="exercise-row">
        <div id="exercise-container"></div>
        <div class="visuals-group">
          <div id="soroban-container"></div>
          <div id="grid-container"></div>
        </div>
      </div>
      <div id="hints-container"></div>
      <div id="feedback-container"></div>
      <div id="provisional-container"></div>
    </main>
  </div>

  <div id="flash-anzan-container" class="flash-anzan-panel" hidden></div>

  <div id="daily-container" class="daily-panel" hidden></div>

  <hr>

  <details open>
    <summary><strong>Achievements</strong></summary>
    <div id="achievements-container"></div>
  </details>

  <hr>

  <details open>
    <summary><strong>Skill Dashboard</strong></summary>
    <div id="dashboard-container"></div>
  </details>

  <hr>

  <details>
    <summary><strong>Attempt Log (last 10)</strong></summary>
    <div id="log-container"></div>
  </details>

  <hr>

  <button id="btn-reset">Reset All Progress</button>

  <div id="cert-modal" class="cert-modal" hidden>
    <div class="cert-backdrop"></div>
    <div class="cert-content" id="cert-content"></div>
  </div>

  <script type="module" src="./js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
